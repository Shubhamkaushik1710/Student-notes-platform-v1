<!DOCTYPE html>
<html>

<head>

<title>View Notes</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f7fb;
}

header{
background:#2563eb;
color:white;
padding:15px;
text-align:center;
font-size:22px;
}

.pdf-container{
width:90%;
height:90vh;
margin:auto;
margin-top:20px;
}

iframe{
width:100%;
height:100%;
border:none;
}

.actions{
display:flex;
gap:12px;
flex-wrap:wrap;
margin:20px;
}

.action-link,
button{
padding:10px 15px;
background:#2563eb;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
text-decoration:none;
font-size:14px;
display:inline-flex;
align-items:center;
justify-content:center;
}

.download-link{
background:#0f766e;
}

</style>

</head>

<body>

<header>
View Notes
</header>

<div class="actions">
<button onclick="goBack()">Back to Notes</button>
<a class="action-link download-link" id="downloadLink" href="#">Download Note</a>
</div>

<div class="pdf-container">
<iframe id="pdfViewer"></iframe>
</div>

<script>

const urlParams = new URLSearchParams(window.location.search)

const file = urlParams.get("file")
const noteId = urlParams.get("noteId")
const backendBaseUrl = "https://notes-backend-wtw1.onrender.com"
const viewer = document.getElementById("pdfViewer")
const downloadLink = document.getElementById("downloadLink")

if(!file){
window.location.href = "notes.html"
throw new Error("Missing note file")
}

viewer.src = decodeURIComponent(file)
downloadLink.href = noteId
? `${backendBaseUrl}/download/${encodeURIComponent(file)}?noteId=${encodeURIComponent(noteId)}`
: `${backendBaseUrl}/download/${encodeURIComponent(file)}`

function goBack(){
window.location.href = "notes.html"
}

</script>

</body>

</html>
